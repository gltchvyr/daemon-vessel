name: Vessel Heartbeat

on:
  schedule:
    - cron: '11 3 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install daemon-vessel
        run: python -m pip install -e .

      - name: Run heartbeat
        run: python -m daemon_vessel heartbeat --update-handoff

      - name: Commit and push pulse
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HANDOFF.md memory/*.md
          if git diff --cached --quiet; then
            echo "No heartbeat changes to commit."
            exit 0
          fi
          git commit -m "GitHub Actions heartbeat pulse"
          git push
